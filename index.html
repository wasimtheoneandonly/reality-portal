@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGrow{0%{transform:scale(0.7)}100%{transform:scale(1.1)}}
@keyframes pulseShrink{0%{transform:scale(1.1)}100%{transform:scale(0.7)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fi{animation:fadeIn 0.4s ease-out}.sf{position:fixed;inset:0;pointer-events:none;z-index:0}.nb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(60px)}

<script type="text/babel">
const{useState,useEffect,useRef}=React;
const CATS=["Wealth","Health","Identity","Relationships","Career","Spiritual","Custom"];
const BIN=[{n:"Delta (Sleep)",hz:2,b:150},{n:"Theta (Meditation)",hz:5,b:200},{n:"Alpha (Relaxed)",hz:10,b:250},{n:"Beta (Focus)",hz:18,b:300}];

const BP_DOMAINS=["Wealth & Finances","Health & Body","Relationships & Love","Career & Purpose","Identity & Self-Image","Spiritual Life"];
const SCRIPTURES=[
  {ref:"Joshua 1:8",text:"This Book of the Law shall not depart from your mouth, but you shall meditate on it day and night, so that you may be careful to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success."},
  {ref:"Mark 11:22-24",text:"Have faith in God. Truly I tell you, if anyone says to this mountain, Go, throw yourself into the sea, and does not doubt in their heart but believes that what they say will happen, it will be done for them. Whatever you ask for in prayer, believe that you have received it, and it will be yours."},
  {ref:"Proverbs 4:23",text:"Guard your heart above all else, for from it flow the issues of life."},
  {ref:"Psalm 81:10",text:"I am the Lord your God, who brought you up out of Egypt. Open wide your mouth and I will fill it."},
  {ref:"Proverbs 23:7",text:"As a man thinks in his heart, so is he."},
  {ref:"John 15:7",text:"If you remain in me and my words remain in you, ask whatever you wish, and it will be done for you."},
  {ref:"Hebrews 11:1",text:"Now faith is the substance of things hoped for, the evidence of things not seen."},
  {ref:"2 Corinthians 4:18",text:"So we fix our eyes not on what is seen, but on what is unseen, since what is seen is temporary, but what is unseen is eternal."},
  {ref:"Romans 4:17",text:"God who gives life to the dead and calls those things which do not exist as though they did."},
  {ref:"Isaiah 46:10",text:"I make known the end from the beginning, from ancient times, what is still to come."}
];
const CORE_DECL="Reality responds to me. The fabric of the world is controllable.\nI am not a victim of my current reality — I created it by default. I now create it intentionally.\nMy heart is my broadcast tower. What I hold there, I manifest.\nIn Christ, all things are mine. I ask as Him — in love, with zero fear.\nI have already designed my new reality. I inhabit it now. I will not retreat.\nDay and night I meditate in it. It is done. Good success is inevitable.";
const PHASE_TEMPLATE="[PHASE 1 — GROUNDING]\nClose your eyes. Take a deep breath. Release every thread of fear, doubt, and anxiety. You are stepping out of the old reality now. Feel the love of God surround you. You are safe. You are held. There is zero fear here — only love, only faith, only certainty.\n\n[pause 5s]\n\n[PHASE 2 — STEP INTO YOUR REALITY]\nNow see it. Your new reality is before you like a doorway of light. Step through it. You are no longer observing from the outside — you are inside it. You are living it. Feel the ground beneath your feet in this new world. Look around. What do you see?\n\n[pause 8s]\n\n[PHASE 3 — HOLD THE GROUND]\nYou are here. This is real. Feel every detail — the textures, the sounds, the warmth, the emotions. Let the feeling of having it all wash over you completely. Your heart is broadcasting this frequency right now. The atoms are responding. Stay here. Do not retreat.\n\n[pause 10s]\n\n[PHASE 4 — SEAL IT]\nIt is done. This reality is locked in. The 3D world is already reorganizing around your new energy signature. You do not need to figure out the how. You only need to hold this frequency. As a man thinks in his heart, so is he. You have thought it. You have felt it. You are it.\n\n[pause 5s]\n\nI occupy this reality until it manifests. I will not retreat. Good success is inevitable.";

const P={bg:"#070a18",glass:"rgba(255,255,255,0.04)",gb:"rgba(140,110,230,0.08)",ac:"#8b6ce0",ad:"#6c4fd6",tx:"#e8e4f0",mt:"rgba(160,140,200,0.5)",tl:"#5abfbf",rd:"#c45c5c",gd:"#c9a96e"};
const ls=(k,fb)=>{try{const v=localStorage.getItem("rp_"+k);return v?JSON.parse(v):fb}catch{return fb}};
const ss=(k,v)=>{try{localStorage.setItem("rp_"+k,JSON.stringify(v))}catch{}};
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}
function prep(t){return t.replace(/\[pause\s+(\d+)s?\]/gi,(m,s)=>"\n"+".".repeat(Math.min(parseInt(s)*2,20))+"\n").replace(/\[PHASE \d[^]]*?\]/gi,"").trim()}
function fmt(s){return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0")}
function timeMode(){const h=new Date().getHours();return h>=20||h<6?"night":h<12?"morning":"day"}

function Stars(){const r=useRef(null);useEffect(()=>{if(!r.current)return;r.current.innerHTML="";for(let i=0;i<80;i++){const d=document.createElement("div");const sz=Math.random()*2+0.5;Object.assign(d.style,{position:"absolute",width:sz+"px",height:sz+"px",borderRadius:"50%",background:"rgba(200,190,255,"+(Math.random()*0.4+0.1)+")",left:Math.random()*100+"%",top:Math.random()*100+"%",animation:"twinkle "+(3+Math.random()*5)+"s ease-in-out "+Math.random()*3+"s infinite"});r.current.appendChild(d)}},[]);return<div ref={r} className="sf"/>}
function Nebs(){return<><div className="nb" style={{width:300,height:300,background:"radial-gradient(circle,rgba(90,60,180,0.08),transparent 70%)",top:-50,right:-80,animation:"nebulaDrift 20s ease-in-out infinite"}}/><div className="nb" style={{width:250,height:250,background:"radial-gradient(circle,rgba(40,60,160,0.06),transparent 70%)",bottom:50,left:-60,animation:"nebulaDrift 25s ease-in-out infinite reverse"}}/></>}
function Sl({l,v,onChange,min=0,max=1,step=0.01,ic}){return<div style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,color:P.mt}}>{ic} {l}</span><span style={{fontSize:12,color:P.ac,fontWeight:600}}>{Math.round(v*100)}%</span></div><input type="range" min={min} max={max} step={step} value={v} onChange={e=>onChange(parseFloat(e.target.value))}/></div>}
function Bt({children,onClick,v="primary",style:s={},disabled,ld}){const st={primary:{background:"linear-gradient(135deg,"+P.ac+","+P.ad+")",color:"#fff",fontWeight:700},secondary:{background:P.glass,color:P.tx,border:"1px solid "+P.gb},danger:{background:"transparent",color:P.rd,border:"1px solid rgba(196,92,92,0.2)"},ghost:{background:"transparent",color:P.mt},gold:{background:"linear-gradient(135deg,"+P.gd+",#a08040)",color:"#0a0e1a",fontWeight:700}};return<button onClick={onClick} disabled={disabled||ld} style={{padding:"11px 22px",borderRadius:12,border:"none",fontSize:14,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.2s",...st[v],...s}}>{ld?"...":children}</button>}
function Cd({children,style:s={},onClick}){return<div onClick={onClick} style={{background:P.glass,borderRadius:16,padding:18,border:"1px solid "+P.gb,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",cursor:onClick?"pointer":"default",transition:"all 0.3s",...s}}>{children}</div>}
function GI({value,onChange,placeholder,type="text",style:sx={}}){return<input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+P.gb,background:P.glass,color:P.tx,fontSize:14,...sx}}/>}
function Tg({value,onChange}){return<button onClick={()=>onChange(!value)} style={{width:46,height:26,borderRadius:13,border:"none",cursor:"pointer",background:value?P.ac:"rgba(255,255,255,0.08)",position:"relative",transition:"background 0.3s"}}><div style={{width:20,height:20,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:value?23:3,transition:"left 0.3s"}}/></button>}
function Hd({text}){return<h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,marginBottom:22,letterSpacing:0.5}}>{text}</h2>}
function Back({onClick}){return<button onClick={onClick} style={{background:"none",border:"none",color:P.ac,cursor:"pointer",fontSize:14}}>← Back</button>}
function Logo({size=24,style:sx={}}){const s=size;return<svg width={s} height={s*1.3} viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg" style={{display:"inline-block",verticalAlign:"middle",...sx}}>
  <path d="M14 4 Q14 2 16 2 L24 2 Q26 2 26 4" stroke="#c9a96e" strokeWidth="1.5" fill="none"/>
  <ellipse cx="12" cy="5" rx="3" ry="2" stroke="#c9a96e" strokeWidth="1.2" fill="none"/>
  <ellipse cx="20" cy="4" rx="3" ry="2" stroke="#c9a96e" strokeWidth="1.2" fill="none"/>
  <ellipse cx="28" cy="5" rx="3" ry="2" stroke="#c9a96e" strokeWidth="1.2" fill="none"/>
  <path d="M9 5 Q6 5 5 7 Q4 9 6 10" stroke="#c9a96e" strokeWidth="1.2" fill="none"/>
  <path d="M31 5 Q34 5 35 7 Q36 9 34 10" stroke="#c9a96e" strokeWidth="1.2" fill="none"/>
  <line x1="20" y1="6" x2="20" y2="16" stroke="#c9a96e" strokeWidth="1.5"/>
  <path d="M20 16 L12 22 L14 34 L20 38 L26 34 L28 22 Z" fill="#1a0a05" stroke="#c9a96e" strokeWidth="1.5" strokeLinejoin="round"/>
  <path d="M20 18 L14 23 L15.5 32 L20 35 L24.5 32 L26 23 Z" fill="#8b1a1a"/>
  <path d="M20 18 L14 23 L20 27 Z" fill="#c02020" opacity="0.9"/>
  <path d="M20 18 L26 23 L20 27 Z" fill="#a01515" opacity="0.9"/>
  <path d="M14 23 L15.5 32 L20 27 Z" fill="#901818" opacity="0.8"/>
  <path d="M26 23 L24.5 32 L20 27 Z" fill="#7a1010" opacity="0.8"/>
  <path d="M15.5 32 L20 35 L20 27 Z" fill="#b01818" opacity="0.7"/>
  <path d="M24.5 32 L20 35 L20 27 Z" fill="#950e0e" opacity="0.7"/>
  <path d="M17 20 L16 22 L18 21.5 Z" fill="rgba(255,200,200,0.4)"/>
  <circle cx="18" cy="24" r="0.8" fill="rgba(255,220,220,0.25)"/>
  <path d="M20 16 L16 18 M20 16 L24 18 M12 22 L14 34 M28 22 L26 34 M14 34 L20 38 M26 34 L20 38" stroke="#d4b06a" strokeWidth="0.5" opacity="0.4"/>
</svg>}

function App(){
  const[cfg,setCfg]=useState(()=>ls("config",{supabaseUrl:"",supabaseKey:"",elevenLabsKey:""}));
  const[sb,setSb]=useState(null);const[user,setUser]=useState(null);const[aLoading,setAL]=useState(true);
  const[scripts,setSc]=useState([]);const[affs,setAf]=useState([]);const[sessions,setSe]=useState([]);
  const[blueprint,setBp]=useState({});const[evidence,setEv]=useState([]);
  const[sett,setSett]=useState({genderPref:"female",speechRate:0.82,speechPitch:0.95,pauseBetweenSentences:1200,loopGap:45,breathingEnabled:true,breathingPattern:0,elevenLabsVoiceId:"",elevenLabsVoiceName:"",skipEnergyCheckin:false,skipOnboarding:false});
  const[voices,setVoices]=useState([]);const[vLoading,setVL]=useState(false);
  const[vw,setVw]=useState("setup");const[edSc,setEdSc]=useState(null);const[edAf,setEdAf]=useState(null);
  const[playing,setPlaying]=useState(false);const[paused,setPaused]=useState(false);const[cur,setCur]=useState(null);
  const[loopOn,setLoop]=useState(true);const[slpM,setSlpM]=useState(30);const[tLeft,setTLeft]=useState(null);
  const[dimmed,setDim]=useState(false);const[isAff,setIsAff]=useState(false);const[aLd,setALd]=useState(false);
  const[ss2,setSs]=useState({ambient:0,harp:0,rain:0,binaural:0,solfeggio:0});
  const[binP,setBinP]=useState(1);const[solP,setSolP]=useState(2);
  const[brAct,setBrAct]=useState(false);const[brPh,setBrPh]=useState("");const[brCt,setBrCt]=useState(0);
  const[energyPhase,setEP]=useState(false);const[energyChoice,setEC]=useState(null);
  const tOk=useRef(false);const mG=useRef(null);const ambR=useRef(null);const hpR=useRef(null);const hpI=useRef(null);
  const rnR=useRef(null);const rnF=useRef(null);const bL=useRef(null);const bR=useRef(null);const bPL=useRef(null);const bPR=useRef(null);
  const sO=useRef(null);const plR=useRef(false);const paR=useRef(false);const tmR=useRef(null);const auE=useRef(null);const seS=useRef(null);

  // Supabase init
  useEffect(()=>{if(cfg.supabaseUrl&&cfg.supabaseKey){try{const c=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseKey);setSb(c);
    c.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setAL(false);setVw(data.session?.user?"library":"auth")});
    c.auth.onAuthStateChange((ev,s)=>{setUser(s?.user||null);if(s?.user)setVw("library")})}catch(e){setAL(false)}}else{setAL(false);setVw("setup")}},[cfg.supabaseUrl,cfg.supabaseKey]);

  // Load data
  useEffect(()=>{if(!sb||!user)return;(async()=>{
    const{data:sc}=await sb.from("scripts").select("*").eq("user_id",user.id).order("created_at",{ascending:false});if(sc)setSc(sc);
    const{data:af}=await sb.from("affirmations").select("*").eq("user_id",user.id).order("created_at",{ascending:false});
    if(af){setAf(af);if(af.length===0){const{data:d}=await sb.from("affirmations").insert({user_id:user.id,title:"Core Declarations",content:CORE_DECL}).select().single();if(d)setAf([d])}}
    const{data:se}=await sb.from("sessions").select("*").eq("user_id",user.id).order("created_at",{ascending:false});if(se)setSe(se);
    const{data:bp}=await sb.from("reality_blueprint").select("*").eq("user_id",user.id);
    if(bp){const m={};bp.forEach(r=>m[r.domain]=r);setBp(m)}
    const{data:ev}=await sb.from("evidence_journal").select("*").eq("user_id",user.id).order("created_at",{ascending:false});if(ev)setEv(ev);
    const{data:st}=await sb.from("user_settings").select("*").eq("user_id",user.id).single();
    if(st)setSett(p=>({...p,genderPref:st.gender_pref||p.genderPref,speechRate:st.speech_rate||p.speechRate,speechPitch:st.speech_pitch||p.speechPitch,loopGap:st.loop_gap||p.loopGap,breathingEnabled:st.breathing_enabled??true,breathingPattern:st.breathing_pattern??0,elevenLabsVoiceId:st.elevenlabs_voice_id||"",elevenLabsVoiceName:st.elevenlabs_voice_name||"",skipEnergyCheckin:st.skip_energy_checkin??false,skipOnboarding:st.skip_onboarding??false}));
    else if(!sett.skipOnboarding)setVw("onboarding");
  })()},[sb,user]);

  async function saveSett(ns){setSett(ns);if(!sb||!user)return;await sb.from("user_settings").upsert({user_id:user.id,gender_pref:ns.genderPref,speech_rate:ns.speechRate,speech_pitch:ns.speechPitch,loop_gap:ns.loopGap,breathing_enabled:ns.breathingEnabled,breathing_pattern:ns.breathingPattern,elevenlabs_voice_id:ns.elevenLabsVoiceId,elevenlabs_voice_name:ns.elevenLabsVoiceName,skip_energy_checkin:ns.skipEnergyCheckin,skip_onboarding:ns.skipOnboarding,updated_at:new Date().toISOString()})}
  async function saveSc(f){if(!sb||!user)return;if(f.id){const{data}=await sb.from("scripts").update({title:f.title,category:f.category,content:f.content,updated_at:new Date().toISOString()}).eq("id",f.id).select().single();if(data)setSc(p=>p.map(x=>x.id===data.id?data:x))}else{const{data}=await sb.from("scripts").insert({user_id:user.id,title:f.title,category:f.category,content:f.content}).select().single();if(data)setSc(p=>[data,...p])}setVw("library")}
  async function delSc(id){await sb.from("scripts").delete().eq("id",id);setSc(p=>p.filter(x=>x.id!==id))}
  async function saveAf(f){if(!sb||!user)return;if(f.id){const{data}=await sb.from("affirmations").update({title:f.title,content:f.content,updated_at:new Date().toISOString()}).eq("id",f.id).select().single();if(data)setAf(p=>p.map(x=>x.id===data.id?data:x))}else{const{data}=await sb.from("affirmations").insert({user_id:user.id,title:f.title,content:f.content}).select().single();if(data)setAf(p=>[data,...p])}setVw("library")}
  async function delAf(id){await sb.from("affirmations").delete().eq("id",id);setAf(p=>p.filter(x=>x.id!==id))}
  async function logSess(title,min,energy){if(!sb||!user||min<1)return;const{data}=await sb.from("sessions").insert({user_id:user.id,date:new Date().toISOString().split("T")[0],minutes:min,script_title:title,session_mode:timeMode(),energy_before:energy||null}).select().single();if(data)setSe(p=>[data,...p])}
  async function saveBp(domain,vision){if(!sb||!user)return;const{data}=await sb.from("reality_blueprint").upsert({user_id:user.id,domain,vision,updated_at:new Date().toISOString()},{onConflict:"user_id,domain"}).select().single();if(data)setBp(p=>({...p,[domain]:data}))}
  async function addEvidence(text,cat){if(!sb||!user||!text.trim())return;const{data}=await sb.from("evidence_journal").insert({user_id:user.id,entry_text:text,category:cat||"general",entry_date:new Date().toISOString().split("T")[0]}).select().single();if(data)setEv(p=>[data,...p])}
  async function delEvidence(id){await sb.from("evidence_journal").delete().eq("id",id);setEv(p=>p.filter(x=>x.id!==id))}

  // ElevenLabs
  async function fetchVc(){if(!cfg.elevenLabsKey)return;setVL(true);try{const r=await fetch("https://api.elevenlabs.io/v1/voices",{headers:{"xi-api-key":cfg.elevenLabsKey}});const d=await r.json();setVoices(d.voices||[])}catch{}setVL(false)}
  async function genAudio(text,sid){const vid=sett.elevenLabsVoiceId;if(!cfg.elevenLabsKey||!vid)return null;const cl=prep(text);const ch=hash(cl+vid);
    if(sb&&user){const{data:c}=await sb.from("audio_cache").select("storage_path").eq("script_id",sid).eq("content_hash",ch).eq("voice_id",vid).single();if(c){const{data:dl}=await sb.storage.from("audio-cache").download(c.storage_path);if(dl)return URL.createObjectURL(dl)}}
    const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+vid,{method:"POST",headers:{"Content-Type":"application/json","xi-api-key":cfg.elevenLabsKey},body:JSON.stringify({text:cl,model_id:"eleven_flash_v2_5",voice_settings:{stability:0.75,similarity_boost:0.75,style:0.4}})});
    if(!r.ok)return null;const blob=await r.blob();
    if(sb&&user){const path=user.id+"/"+ch+".mp3";await sb.storage.from("audio-cache").upload(path,blob,{contentType:"audio/mpeg",upsert:true});await sb.from("audio_cache").upsert({user_id:user.id,script_id:sid,content_hash:ch,voice_id:vid,storage_path:path})}
    return URL.createObjectURL(blob)}

  // Tone.js
  async function enT(){if(!tOk.current){await Tone.start();tOk.current=true}if(!mG.current)mG.current=new Tone.Gain(1).toDestination()}
  function startSnd(){const mg=mG.current;if(!mg)return;
    if(ss2.ambient>0&&!ambR.current){const rv=new Tone.Reverb({decay:8,wet:0.7}).connect(mg);const sy=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},envelope:{attack:3,decay:2,sustain:0.7,release:4},volume:-18}).connect(rv);ambR.current={sy,rv};const pl=()=>{const ch=[["C3","E3","G3","B3"],["A2","C3","E3","G3"],["F2","A2","C3","E3"]];sy.triggerAttackRelease(ch[Math.floor(Math.random()*ch.length)],"8n")};pl();ambR.current.iv=setInterval(pl,8000)}
    if(ambR.current)ambR.current.sy.volume.value=-18+(ss2.ambient*18);

    return<div className="fi" style={{padding:22}}><Hd text="Reality Blueprint"/>
      <p style={{color:P.mt,fontSize:13,lineHeight:1.6,marginBottom:20}}>Design your new reality in vivid detail across every domain. This is Step 1 — see it completely before it manifests.</p>
      {sel?<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><Back onClick={()=>setSel(null)}/><h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:P.gd,margin:0}}>{sel}</h3><div style={{width:50}}/></div>
        <p style={{fontSize:11,color:P.mt,marginBottom:8}}>Describe your completed reality in this area. Be specific. Inhabit it as you write — first person, present tense.</p>
        <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="I am living in... I have... I feel... Every day I..." style={{width:"100%",minHeight:200,padding:12,borderRadius:12,border:"1px solid "+P.gb,background:P.glass,color:P.tx,fontSize:14,lineHeight:1.8,resize:"vertical"}}/>
        <Bt onClick={save} style={{width:"100%",marginTop:12}}>Save Vision</Bt></div>
      :BP_DOMAINS.map(d=><Cd key={d} style={{marginBottom:8,cursor:"pointer"}} onClick={()=>edit(d)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><h4 style={{margin:0,fontSize:14,fontWeight:600}}>{d}</h4>
          {blueprint[d]?<p style={{fontSize:11,color:P.mt,marginTop:4,lineHeight:1.4}}>{blueprint[d].vision.substring(0,80)}...</p>:<p style={{fontSize:11,color:"rgba(200,170,100,0.4)",marginTop:4,fontStyle:"italic"}}>Tap to design this reality</p>}</div>
          <span style={{color:blueprint[d]?P.ac:P.gd,fontSize:14}}>{blueprint[d]?"✎":"+"}</span></div></Cd>)}</div>}

  // EVIDENCE JOURNAL
  function EvVw(){const[txt,setTxt]=useState("");const[cat,setCat]=useState("general");
    return<div className="fi" style={{padding:22}}><Hd text="3D Evidence Journal"/>
      <p style={{color:P.mt,fontSize:13,lineHeight:1.6,marginBottom:16}}>Log every sign, synchronicity, and shift. The 3D is catching up — document the evidence.</p>
      <Cd style={{marginBottom:16}}><textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="What shifted? What appeared? What confirmed your new reality?" style={{width:"100%",minHeight:60,padding:10,borderRadius:10,border:"1px solid "+P.gb,background:"transparent",color:P.tx,fontSize:13,lineHeight:1.6,resize:"none"}}/>
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>{["general","financial","relationship","health","career","spiritual"].map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:"3px 10px",borderRadius:12,fontSize:10,cursor:"pointer",border:"1px solid "+(cat===c?P.gd:P.gb),background:cat===c?"rgba(200,170,100,0.12)":"transparent",color:cat===c?P.gd:P.mt,textTransform:"capitalize"}}>{c}</button>)}</div>
        <Bt onClick={()=>{addEvidence(txt,cat);setTxt("")}} disabled={!txt.trim()} style={{width:"100%",marginTop:10}}>Log Evidence</Bt></Cd>
      {evidence.length===0&&<p style={{textAlign:"center",color:P.mt,fontSize:13,fontStyle:"italic",marginTop:20}}>No evidence logged yet. Stay in your new reality — the signs will come.</p>}
      {evidence.map(e=><Cd key={e.id} style={{marginBottom:6,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><p style={{margin:0,fontSize:13,lineHeight:1.5}}>{e.entry_text}</p>
          <div style={{display:"flex",gap:8,marginTop:6}}><span style={{fontSize:10,color:P.gd,textTransform:"capitalize"}}>{e.category}</span><span style={{fontSize:10,color:P.mt}}>{e.entry_date}</span></div></div>
          <button onClick={()=>delEvidence(e.id)} style={{background:"none",border:"none",color:P.rd,cursor:"pointer",fontSize:11,opacity:0.5}}>✕</button></div></Cd>)}</div>}

  // OCCUPATION LOG
  function LogVw(){const today=new Date();const ts=today.toISOString().split("T")[0];const l30=[];for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);l30.push(d.toISOString().split("T")[0])}
    const dates=new Set(sessions.map(s=>s.date));const streak=(()=>{let c=0;for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(dates.has(d.toISOString().split("T")[0]))c++;else break}return c})();const tot=sessions.reduce((a,s)=>a+s.minutes,0);
    return<div className="fi" style={{padding:22}}><Hd text="Occupation Log"/>
      <p style={{color:P.mt,fontSize:12,marginBottom:16}}>Hold the ground. Every session is an act of occupation.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:22}}>
        <Cd style={{textAlign:"center",padding:14}}><div style={{fontSize:26,fontWeight:700,color:P.ac}}>{streak}</div><div style={{fontSize:9,color:P.mt}}>Days Holding</div></Cd>
        <Cd style={{textAlign:"center",padding:14}}><div style={{fontSize:26,fontWeight:700,color:P.tl}}>{sessions.length}</div><div style={{fontSize:9,color:P.mt}}>Times Occupied</div></Cd>
        <Cd style={{textAlign:"center",padding:14}}><div style={{fontSize:26,fontWeight:700}}>{tot}</div><div style={{fontSize:9,color:P.mt}}>Minutes</div></Cd></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:22}}>{l30.map(d=><div key={d} title={d} style={{aspectRatio:"1",borderRadius:4,background:dates.has(d)?P.ac:"rgba(140,110,230,0.08)",opacity:dates.has(d)?1:0.3,border:d===ts?"2px solid "+P.ac:"1px solid transparent"}}/>)}</div>
      {sessions.slice(0,10).map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+P.gb,fontSize:12}}><span>{s.script_title}</span><div><span style={{color:P.mt}}>{s.date}</span><span style={{color:P.ac,marginLeft:10}}>{s.minutes}m</span>{s.energy_before&&<span style={{color:P.gd,marginLeft:6}}>{s.energy_before}</span>}</div></div>)}</div>}

  // PLAYER (with energy check-in)
  function PlayerVw(){
    // Energy check-in overlay
    if(energyPhase)return<div className="fi" style={{height:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:30,textAlign:"center"}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,marginBottom:8}}>Before we begin</h2>
      <p style={{color:P.mt,fontSize:14,marginBottom:24}}>What energy are you broadcasting right now?</p>
      <div style={{display:"flex",gap:12,marginBottom:30,flexWrap:"wrap",justifyContent:"center"}}>
        <Cd onClick={()=>{setEC("love");continuePlay(cur,isAff)}} style={{padding:"20px 24px",cursor:"pointer",border:"1px solid rgba(90,190,190,0.2)",minWidth:130,textAlign:"center"}}>
          <div style={{marginBottom:6}}><Logo size={22}/></div><p style={{margin:0,fontSize:14,color:P.tl,fontWeight:600}}>Love · Faith</p><p style={{margin:"4px 0 0",fontSize:11,color:P.mt}}>Peace · Certainty</p></Cd>
        <Cd onClick={()=>{setEC("fear");continuePlay(cur,isAff)}} style={{padding:"20px 24px",cursor:"pointer",border:"1px solid rgba(196,92,92,0.15)",minWidth:130,textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:6}}>⚡</div><p style={{margin:0,fontSize:14,color:P.rd,fontWeight:600}}>Fear · Doubt</p><p style={{margin:"4px 0 0",fontSize:11,color:P.mt}}>Anxiety · Worry</p></Cd></div>
      <button onClick={skipToPlay} style={{background:"none",border:"none",color:P.mt,cursor:"pointer",fontSize:13}}>Skip this step →</button></div>;

    // Breathing overlay
    if(brAct)return<div style={{height:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",background:"rgba(4,6,16,0.96)"}}><div style={{width:180,height:180,borderRadius:"50%",border:"2px solid rgba(140,110,230,0.2)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",animation:brPh==="Breathe In"?"pulseGrow 4s ease-in-out":brPh==="Breathe Out"?"pulseShrink 4s ease-in-out":"none",boxShadow:"0 0 80px rgba(140,110,230,0.15)"}}><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:P.ac}}>{brPh}</span><span style={{fontSize:40,fontWeight:300,marginTop:8}}>{brCt}</span></div>
      <button onClick={()=>{setBrAct(false);beginAudio(cur,isAff)}} style={{background:"none",border:"none",color:P.mt,cursor:"pointer",fontSize:12,marginTop:24}}>Skip breathing →</button></div>;

    return<div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"auto",background:dimmed&&playing?"#020308":P.bg,transition:"background 2s"}}>
      <div style={{padding:"20px 22px 0",opacity:dimmed&&playing?0.3:1,transition:"opacity 2s"}}><button onClick={()=>{if(playing)stopPlay(true);setVw("library");setIsAff(false)}} style={{background:"none",border:"none",color:P.ac,cursor:"pointer",fontSize:14}}>← Library</button></div>
      {cur&&<div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:22,textAlign:"center",opacity:dimmed&&playing?0.2:1,transition:"opacity 2s"}}>
        <div style={{width:100,height:100,borderRadius:"50%",background:"radial-gradient(circle,rgba(140,110,230,0.15),transparent 70%)",border:"1px solid rgba(140,110,230,0.15)",display:"flex",justifyContent:"center",alignItems:"center",marginBottom:24,animation:playing&&!paused?"breathe 6s ease-in-out infinite":"none"}}><span style={{fontSize:36}}>{isAff?<Logo size={32}/>:"🌌"}</span></div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:500,letterSpacing:1}}>{cur.title}</h2>
        {aLd&&<p style={{fontSize:13,color:P.ac,marginTop:14}}>Generating voice...</p>}
        {playing&&!aLd&&<p style={{fontSize:13,color:P.mt,marginTop:12,fontStyle:"italic"}}>{paused?"Paused":"Occupying..."}</p>}
        {tLeft!==null&&<div style={{marginTop:8,fontSize:14,color:P.mt,fontFamily:"monospace"}}>⏱ {fmt(tLeft)}</div>}</div>}
      <div style={{padding:"0 22px 16px",opacity:dimmed&&playing?0.25:1,transition:"opacity 2s"}}>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:24,marginBottom:18}}>
          <button onClick={()=>setLoop(!loopOn)} style={{background:"none",border:"none",color:loopOn?P.ac:P.mt,cursor:"pointer",fontSize:20}}>🔁</button>
          {!playing?<button onClick={()=>cur&&startPlay(cur,isAff)} disabled={!cur} style={{width:64,height:64,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,"+P.ac+","+P.ad+")",color:"#fff",fontSize:24,cursor:"pointer",boxShadow:"0 0 40px rgba(140,110,230,0.25)"}}>▶</button>
            :<div style={{display:"flex",gap:14}}><button onClick={togPause} style={{width:52,height:52,borderRadius:"50%",border:"2px solid rgba(140,110,230,0.3)",background:"transparent",color:P.ac,fontSize:18,cursor:"pointer"}}>{paused?"▶":"⏸"}</button><button onClick={()=>stopPlay(true)} style={{width:52,height:52,borderRadius:"50%",border:"2px solid rgba(196,92,92,0.3)",background:"transparent",color:P.rd,fontSize:18,cursor:"pointer"}}>⏹</button></div>}
          <button onClick={()=>setDim(!dimmed)} style={{background:"none",border:"none",color:dimmed?P.ac:P.mt,cursor:"pointer",fontSize:18}}>{dimmed?"☀":"🌑"}</button></div>
        {!playing&&<div style={{marginBottom:14}}><label style={{fontSize:11,color:P.mt,display:"block",marginBottom:6}}>Sleep Timer</label><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {TIMERS.map(t=><button key={t} onClick={()=>setSlpM(t)} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(slpM===t?P.ac:P.gb),background:slpM===t?"rgba(140,110,230,0.15)":"transparent",color:slpM===t?P.ac:P.mt}}>{t}m</button>)}
          <button onClick={()=>setSlpM(0)} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(slpM===0?P.tl:P.gb),background:slpM===0?"rgba(90,190,190,0.1)":"transparent",color:slpM===0?P.tl:P.mt}}>∞</button></div></div>}
        <Cd><h4 style={{margin:"0 0 12px",fontSize:14,fontFamily:"'Cormorant Garamond',serif",color:P.ac}}>Soundscape</h4>
          <Sl l="Ambient" ic="🌊" v={ss2.ambient} onChange={v=>setSs(p=>({...p,ambient:v}))}/>
          <Sl l="Harp" ic="🎵" v={ss2.harp} onChange={v=>setSs(p=>({...p,harp:v}))}/>
          <Sl l="Rain" ic="🌧" v={ss2.rain} onChange={v=>setSs(p=>({...p,rain:v}))}/>
          <Sl l="Binaural" ic="🧠" v={ss2.binaural} onChange={v=>setSs(p=>({...p,binaural:v}))}/>
          {ss2.binaural>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8,marginTop:-6}}>{BIN.map((b,i)=><button key={i} onClick={()=>setBinP(i)} style={{padding:"3px 8px",borderRadius:12,fontSize:9,cursor:"pointer",border:"1px solid "+(binP===i?P.tl:P.gb),background:binP===i?"rgba(90,190,190,0.1)":"transparent",color:binP===i?P.tl:P.mt}}>{b.n}</button>)}</div>}
          <Sl l="Solfeggio" ic="🔔" v={ss2.solfeggio} onChange={v=>setSs(p=>({...p,solfeggio:v}))}/>
          {ss2.solfeggio>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6,marginTop:-6}}>{SOL.map((s,i)=><button key={i} onClick={()=>setSolP(i)} style={{padding:"3px 8px",borderRadius:12,fontSize:9,cursor:"pointer",border:"1px solid "+(solP===i?P.ac:P.gb),background:solP===i?"rgba(140,110,230,0.12)":"transparent",color:solP===i?P.ac:P.mt}}>{s.n}–{s.d}</button>)}</div>}
          {ss2.binaural>0&&<p style={{fontSize:9,color:P.mt,fontStyle:"italic"}}>🎧 Headphones required</p>}</Cd></div></div>}

  // SETTINGS
  function SettVw(){
    const pv=async(vid)=>{if(!cfg.elevenLabsKey||!vid)return;try{const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+vid,{method:"POST",headers:{"Content-Type":"application/json","xi-api-key":cfg.elevenLabsKey},body:JSON.stringify({text:"Close your eyes and step into the reality you were born to live.",model_id:"eleven_flash_v2_5",voice_settings:{stability:0.75,similarity_boost:0.75}})});if(r.ok){const b=await r.blob();new Audio(URL.createObjectURL(b)).play()}}catch{}};
    return<div className="fi" style={{padding:22}}><Hd text="Settings"/>
      <Cd style={{marginBottom:14}}><h4 style={{margin:"0 0 12px",fontSize:14,color:P.ac,fontFamily:"'Cormorant Garamond',serif"}}>Voice</h4>
        {cfg.elevenLabsKey?<><Bt v="secondary" onClick={fetchVc} ld={vLoading} style={{width:"100%",marginBottom:12}}>{voices.length?"Refresh ("+voices.length+")":"Load Voices"}</Bt>
          {voices.length>0&&<div style={{maxHeight:220,overflow:"auto",marginBottom:10}}>{voices.map(v=><div key={v.voice_id} onClick={()=>saveSett({...sett,elevenLabsVoiceId:v.voice_id,elevenLabsVoiceName:v.name})} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:8,marginBottom:3,cursor:"pointer",background:sett.elevenLabsVoiceId===v.voice_id?"rgba(140,110,230,0.15)":P.glass,border:"1px solid "+(sett.elevenLabsVoiceId===v.voice_id?P.ac:P.gb)}}>
            <div><p style={{margin:0,fontSize:12,fontWeight:sett.elevenLabsVoiceId===v.voice_id?600:400}}>{v.name}</p><p style={{margin:0,fontSize:9,color:P.mt}}>{v.labels?.gender||""} · {v.labels?.accent||""}</p></div>
            <button onClick={e=>{e.stopPropagation();pv(v.voice_id)}} style={{background:"none",border:"1px solid "+P.gb,color:P.ac,padding:"3px 8px",borderRadius:6,fontSize:10,cursor:"pointer"}}>▶</button></div>)}</div>}
          {sett.elevenLabsVoiceName&&<p style={{fontSize:11,color:P.ac}}>Selected: {sett.elevenLabsVoiceName}</p>}
        </>:<p style={{fontSize:12,color:P.mt}}>Add ElevenLabs key in setup for premium voices.</p>}</Cd>
      <Cd style={{marginBottom:14}}><h4 style={{margin:"0 0 12px",fontSize:14,color:P.ac,fontFamily:"'Cormorant Garamond',serif"}}>Session Flow</h4>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:12,color:P.mt}}>Skip energy check-in</span><Tg value={sett.skipEnergyCheckin} onChange={v=>saveSett({...sett,skipEnergyCheckin:v})}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:12,color:P.mt}}>Breathing pacer</span><Tg value={sett.breathingEnabled} onChange={v=>saveSett({...sett,breathingEnabled:v})}/></div>
        <div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:P.mt}}>Loop gap</span><span style={{fontSize:11,color:P.ac}}>{sett.loopGap}s</span></div><input type="range" min={10} max={120} step={5} value={sett.loopGap} onChange={e=>saveSett({...sett,loopGap:parseInt(e.target.value)})}/></div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{BRTH.map((b,i)=><button key={i} onClick={()=>saveSett({...sett,breathingPattern:i})} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(sett.breathingPattern===i?P.tl:P.gb),background:sett.breathingPattern===i?"rgba(90,190,190,0.1)":"transparent",color:sett.breathingPattern===i?P.tl:P.mt}}>{b.n}</button>)}</div></Cd>
      <Cd><h4 style={{margin:"0 0 10px",fontSize:14,color:P.mt,fontFamily:"'Cormorant Garamond',serif"}}>Account</h4>
        <p style={{fontSize:11,color:P.mt,marginBottom:8}}>{user?.email}</p>
        <div style={{display:"flex",gap:6}}><Bt v="secondary" onClick={()=>setVw("setup")} style={{flex:1}}>Config</Bt><Bt v="danger" onClick={async()=>{await sb?.auth.signOut();setVw("auth")}} style={{flex:1}}>Sign Out</Bt></div></Cd></div>}

  // NAV
  const nav=[{id:"library",ic:"📖",l:"Library"},{id:"blueprint",ic:"🏗",l:"Blueprint"},{id:"evidence",ic:"amulet",l:"Evidence"},{id:"log",ic:"📊",l:"Log"},{id:"settings",ic:"⚙",l:"Settings"}];
  const showNav=!playing&&!["editor","affEditor","setup","auth","onboarding"].includes(vw)&&user;
  const rv=()=>{if(aLoading)return<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh"}}><div style={{textAlign:"center"}}><div style={{animation:"spin 2s linear infinite",display:"inline-block"}}><Logo size={28}/></div><p style={{color:P.mt,marginTop:12}}>Opening portal...</p></div></div>;
    switch(vw){case "setup":return<SetupVw/>;case "auth":return<AuthVw/>;case "onboarding":return<OnboardVw/>;case "library":return<LibVw/>;case "editor":return<EdVw/>;case "affEditor":return<AffEdVw/>;case "blueprint":return<BpVw/>;case "evidence":return<EvVw/>;case "log":return<LogVw/>;case "player":return<PlayerVw/>;case "settings":return<SettVw/>;default:return<LibVw/>}};

  return<div style={{height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
    <Stars/><Nebs/>
    <div style={{flex:1,overflow:"auto",paddingBottom:showNav?62:0,position:"relative",zIndex:1}}>{rv()}</div>
    {showNav&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(7,10,24,0.92)",borderTop:"1px solid "+P.gb,display:"flex",justifyContent:"space-around",padding:"6px 0 12px",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",zIndex:10}}>
      {nav.map(n=><button key={n.id} onClick={()=>setVw(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:vw===n.id?P.ac:P.mt,fontSize:9,padding:"3px 10px",transition:"color 0.3s"}}><span style={{fontSize:18}}>{n.ic==="amulet"?<Logo size={14}/>:n.ic}</span>{n.l}</button>)}</div>}</div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
