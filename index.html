  function buildSentences(text,al){
    if(!al||!al.characters)return[];
    const fullText=al.characters.join("");const starts=al.character_start_times_seconds;const ends=al.character_end_times_seconds;
    const sents=[];let cur="",sIdx=0;
    for(let i=0;i<fullText.length;i++){
      cur+=fullText[i];
      if(fullText[i]==="."||fullText[i]==="!"||fullText[i]==="?"||i===fullText.length-1){
        const trimmed=cur.trim();
        if(trimmed.length>3){sents.push({text:trimmed,start:starts[sIdx],end:ends[i]})}
        cur="";sIdx=i+1;
      }
    }
    if(sents.length===0&&fullText.trim()){sents.push({text:fullText.trim(),start:starts[0],end:ends[ends.length-1]})}
    return sents;
  }

  function startSnd(){const mg=mG.current;if(!mg)return;const s=ss2R.current;
    if(s.ambient>0&&!ambR.current){
      const dl=new Tone.FeedbackDelay({delayTime:1.2,feedback:0.3,wet:0.4}).connect(mg);
      const sy=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsine",spread:20},envelope:{attack:2,decay:4,sustain:0.9,release:6},volume:-14}).connect(dl);
      const chords=[["C3","E3","G3","B3"],["A2","C3","E3","G3"],["F2","A2","C3","E3"],["D3","F3","A3","C4"]];
      sy.triggerAttackRelease(chords[0],"8m");
      const lp=new Tone.Loop(()=>{try{sy.triggerAttackRelease(chords[Math.floor(Math.random()*chords.length)],"8m")}catch{}},10);
      lp.start();ambR.current={sy,dl,lp}}
    if(ambR.current)ambR.current.sy.volume.value=-14+(s.ambient*14);
    if(s.harp>0&&!hpR.current){
      const sy=new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:0.005,decay:2.5,sustain:0,release:2},volume:-10}).connect(mg);
      const notes=["C4","D4","E4","G4","A4","C5","D5","E5","G5","A5"];
      sy.triggerAttackRelease(notes[Math.floor(Math.random()*notes.length)],"8n");
      const lp=new Tone.Loop(()=>{try{sy.triggerAttackRelease(notes[Math.floor(Math.random()*notes.length)],"8n")}catch{}},2.5);
      lp.start();hpR.current={sy,lp}}
    if(hpR.current)hpR.current.sy.volume.value=-10+(s.harp*10);
    if(s.rain>0&&!rnR.current){const f=new Tone.Filter(600,"lowpass").connect(mg);const n=new Tone.Noise("pink").connect(f);n.volume.value=-20;n.start();rnR.current=n;rnF.current=f}
    if(rnR.current)rnR.current.volume.value=-20+(s.rain*14);
    if(s.binaural>0&&!bL.current){const p=BIN[binP];const pL=new Tone.Panner(-1).connect(mg);const pR=new Tone.Panner(1).connect(mg);const oL=new Tone.Oscillator(p.b,"sine").connect(pL);const oR=new Tone.Oscillator(p.b+p.hz,"sine").connect(pR);oL.volume.value=-22;oR.volume.value=-22;oL.start();oR.start();bL.current=oL;bR.current=oR;bPL.current=pL;bPR.current=pR}
    if(bL.current){const v=-22+(s.binaural*16);bL.current.volume.value=v;bR.current.volume.value=v}
    if(s.solfeggio>0&&!sO.current){const o=new Tone.Oscillator(SOL[solP].f,"sine").connect(mg);o.volume.value=-26;o.start();sO.current=o}
    if(sO.current)sO.current.volume.value=-26+(s.solfeggio*14)}

  function LogVw(){const today=new Date();const ts=today.toISOString().split("T")[0];const l30=[];for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);l30.push(d.toISOString().split("T")[0])}

    return<div className="fi" style={{padding:22}}><Hd text="Occupation Log"/>

        {playing&&!aLd&&sentences.length>0&&<p style={{fontSize:11,color:P.mt,marginTop:8,fontStyle:"italic"}}>{paused?"Paused":"Occupying..."}</p>}
        {playing&&!aLd&&audioDur>0&&<div style={{width:"100%",maxWidth:220,margin:"12px auto 0",opacity:0.55}}>

            <div style={{width:(curTime/audioDur*100)+"%",height:"100%",background:"rgba(160,140,220,0.6)",borderRadius:1,transition:"width 0.3s linear"}}/></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:10,color:"rgba(180,165,220,0.6)",fontFamily:"monospace"}}>{fmt(Math.floor(curTime))}</span><span style={{fontSize:10,color:"rgba(180,165,220,0.6)",fontFamily:"monospace"}}>{fmt(Math.floor(audioDur))}</span></div></div>}
        {tLeft!==null&&<div style={{marginTop:8,fontSize:14,color:P.mt,fontFamily:"monospace"}}>⏱ {fmt(tLeft)}</div>}</div>}
      <div style={{padding:"0 22px 16px",opacity:dimmed&&playing?0.25:1,transition:"opacity 2s",position:"relative",zIndex:1}}>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:24,marginBottom:18}}>
          <button onClick={()=>setLoop(!loopOn)} style={{background:"none",border:"none",color:loopOn?P.ac:P.mt,cursor:"pointer",fontSize:20}}>🔁</button>
          {!playing?<button onClick={()=>cur&&startPlay(cur,isAff)} disabled={!cur} style={{width:64,height:64,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,rgba(180,40,40,0.8),rgba(140,20,20,0.9))",color:"rgba(255,200,200,0.9)",fontSize:24,cursor:"pointer",boxShadow:"0 0 40px rgba(180,40,40,0.2)"}}>▶</button>
            :<div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick={()=>{if(auE.current){auE.current.currentTime=Math.max(0,auE.current.currentTime-10);setCurTime(auE.current.currentTime)}}} style={{width:40,height:40,borderRadius:"50%",border:"1px solid rgba(140,110,230,0.15)",background:"transparent",color:"rgba(160,140,200,0.5)",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:600}}>-10</button>
              <button onClick={togPause} style={{width:52,height:52,borderRadius:"50%",border:"2px solid rgba(180,40,40,0.3)",background:"transparent",color:"rgba(200,120,120,0.7)",fontSize:18,cursor:"pointer"}}>{paused?"▶":"⏸"}</button>
              <button onClick={()=>stopPlay(true)} style={{width:40,height:40,borderRadius:"50%",border:"2px solid rgba(196,92,92,0.2)",background:"transparent",color:P.rd,fontSize:14,cursor:"pointer"}}>⏹</button>
              <button onClick={()=>{if(auE.current){auE.current.currentTime=Math.min(auE.current.duration||9999,auE.current.currentTime+10);setCurTime(auE.current.currentTime)}}} style={{width:40,height:40,borderRadius:"50%",border:"1px solid rgba(140,110,230,0.15)",background:"transparent",color:"rgba(160,140,200,0.5)",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:600}}>+10</button>
            </div>}
          <button onClick={()=>setDim(!dimmed)} style={{background:"none",border:"none",color:dimmed?P.ac:P.mt,cursor:"pointer",fontSize:18}}>{dimmed?"☀":"🌑"}</button></div>
        <div style={{marginBottom:14}}><label style={{fontSize:11,color:P.mt,display:"block",marginBottom:6}}>Sleep Timer {tLeft!==null&&<span style={{color:P.ac,fontFamily:"monospace"}}> · {fmt(tLeft)} remaining</span>}</label><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {TIMERS.map(t=><button key={t} onClick={()=>{setSlpM(t);if(playing){if(tmR.current)clearInterval(tmR.current);const end=Date.now()+t*60000;setTLeft(t*60);tmR.current=setInterval(()=>{const l=Math.max(0,Math.round((end-Date.now())/1000));setTLeft(l);if(l<=45&&l>0&&mG.current)mG.current.gain.value=l/45;if(l<=0)stopPlay(true)},1000)}}} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(slpM===t?P.ac:P.gb),background:slpM===t?"rgba(140,110,230,0.15)":"transparent",color:slpM===t?P.ac:P.mt}}>{t}m</button>)}
          <button onClick={()=>{setSlpM(0);if(playing&&tmR.current){clearInterval(tmR.current);tmR.current=null;setTLeft(null);if(mG.current)mG.current.gain.value=1}}} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(slpM===0?P.tl:P.gb),background:slpM===0?"rgba(90,190,190,0.1)":"transparent",color:slpM===0?P.tl:P.mt}}>∞</button></div></div>
        <Bt v="secondary" onClick={()=>{Tone.start();Tone.Transport.start();if(!mG.current)mG.current=new Tone.Gain(1).toDestination();tOk.current=true;setShowSS(true)}} style={{width:"100%",marginTop:4}}>🎵 Soundscape Mixer</Bt>
      </div>
      {showSS&&<div onClick={()=>setShowSS(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxHeight:"80vh",overflow:"auto",background:"#0d1228",borderRadius:"20px 20px 0 0",padding:"20px 22px 60px",border:"1px solid rgba(140,110,230,0.1)",borderBottom:"none"}}>
          <div style={{width:40,height:4,background:"rgba(140,110,230,0.2)",borderRadius:2,margin:"0 auto 18px"}}/>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:P.ac,margin:"0 0 16px",textAlign:"center"}}>Soundscape Mixer</h3>
          
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button onClick={()=>{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();g.gain.value=0.3;o.frequency.value=440;o.connect(g);g.connect(c.destination);o.start();setTimeout(()=>{o.stop();c.close()},800)}} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(90,190,190,0.2)",background:"rgba(90,190,190,0.08)",color:P.tl,fontSize:12,cursor:"pointer"}}>Test Basic Audio</button>
            <button onClick={()=>{Tone.start();const s=new Tone.Synth().toDestination();s.triggerAttackRelease("C4","4n");setTimeout(()=>s.dispose(),2000)}} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid rgba(140,110,230,0.2)",background:"rgba(140,110,230,0.08)",color:P.ac,fontSize:12,cursor:"pointer"}}>Test Tone.js</button>

            {[{n:"Deep Space",v:{ambient:0.6,harp:0,rain:0,binaural:0.4,solfeggio:0.3}},
              {n:"Gentle Rain",v:{ambient:0.3,harp:0,rain:0.8,binaural:0,solfeggio:0}},
              {n:"Temple Harp",v:{ambient:0.2,harp:0.7,rain:0,binaural:0,solfeggio:0.3}},
              {n:"Theta Waves",v:{ambient:0.3,harp:0,rain:0.3,binaural:0.7,solfeggio:0}},
              {n:"Full Immersion",v:{ambient:0.5,harp:0.3,rain:0.4,binaural:0.3,solfeggio:0.3}},
              {n:"Silent",v:{ambient:0,harp:0,rain:0,binaural:0,solfeggio:0}}

                border:"1px solid rgba(140,110,230,0.12)",background:"rgba(140,110,230,0.06)",color:"rgba(200,180,255,0.7)"}}>{pr.n}</button>)}
          </div>

          {[{k:"ambient",n:"Ambient Pad",ic:"🌊"},{k:"harp",n:"Harp",ic:"🎵"},{k:"rain",n:"Rain",ic:"🌧"},{k:"binaural",n:"Binaural Beats",ic:"🧠"},{k:"solfeggio",n:"Solfeggio Tone",ic:"🔔"}].map(layer=>(
            <div key={layer.k} style={{marginBottom:14}}>
              <p style={{fontSize:13,color:P.mt,margin:"0 0 6px"}}>{layer.ic} {layer.n}</p>
              <div style={{display:"flex",gap:6}}>
                {[{l:"Off",v:0},{l:"Low",v:0.3},{l:"Med",v:0.6},{l:"High",v:0.9}].map(lv=>{
                  const cur=ss2[layer.k];const active=lv.v===0?cur===0:Math.abs(cur-lv.v)<0.15;
                  return<button key={lv.l} onClick={()=>{Tone.start();Tone.Transport.start();if(!mG.current)mG.current=new Tone.Gain(1).toDestination();tOk.current=true;const nv={...ss2R.current,[layer.k]:lv.v};ss2R.current=nv;setSs(nv);if(lv.v===0){killLayer(layer.k)}else{setTimeout(startSnd,300)}}}
                    style={{flex:1,padding:"10px 0",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:active?600:400,

                      background:active?"rgba(140,110,230,0.15)":"rgba(255,255,255,0.02)",
                      color:active?P.ac:"rgba(160,140,200,0.4)"}}>{lv.l}</button>})}
              </div>
              {layer.k==="binaural"&&ss2.binaural>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
                {BIN.map((b,i)=><button key={i} onClick={()=>setBinP(i)} style={{padding:"5px 10px",borderRadius:10,fontSize:10,cursor:"pointer",

              {layer.k==="solfeggio"&&ss2.solfeggio>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
                {SOL.map((s,i)=><button key={i} onClick={()=>setSolP(i)} style={{padding:"5px 10px",borderRadius:10,fontSize:10,cursor:"pointer",
                  border:"1px solid "+(solP===i?P.ac:P.gb),background:solP===i?"rgba(140,110,230,0.12)":"transparent",color:solP===i?P.ac:P.mt}}>{s.n}–{s.d}</button>)}</div>}
            </div>
          ))}
          {ss2.binaural>0&&<p style={{fontSize:10,color:P.mt,fontStyle:"italic",textAlign:"center",marginTop:4}}>🎧 Headphones required for binaural beats</p>}
        </div>

  // SETTINGS
  function SettVw(){

            <div><p style={{margin:0,fontSize:12,fontWeight:sett.elevenLabsVoiceId===v.voice_id?600:400}}>{v.name}</p><p style={{margin:0,fontSize:9,color:P.mt}}>{v.labels?.gender||""} · {v.labels?.accent||""}</p></div>
            <button onClick={e=>{e.stopPropagation();pv(v.voice_id)}} style={{background:"none",border:"1px solid "+P.gb,color:P.ac,padding:"3px 8px",borderRadius:6,fontSize:10,cursor:"pointer"}}>▶</button></div>)}</div>}
          {sett.elevenLabsVoiceName&&<p style={{fontSize:11,color:P.ac}}>Selected: {sett.elevenLabsVoiceName}</p>}
        </>:<p style={{fontSize:12,color:P.mt}}>Enter your ElevenLabs API key above to enable premium voices.</p>}</Cd>
      <Cd style={{marginBottom:14}}><h4 style={{margin:"0 0 12px",fontSize:14,color:P.ac,fontFamily:"'Cormorant Garamond',serif"}}>Session Flow</h4>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:12,color:P.mt}}>Skip energy check-in</span><Tg value={sett.skipEnergyCheckin} onChange={v=>saveSett({...sett,skipEnergyCheckin:v})}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:12,color:P.mt}}>Breathing pacer</span><Tg value={sett.breathingEnabled} onChange={v=>saveSett({...sett,breathingEnabled:v})}/></div>
        <div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:P.mt}}>Loop gap</span><span style={{fontSize:11,color:P.ac}}>{sett.loopGap}s</span></div><input type="range" min={10} max={120} step={5} value={sett.loopGap} onChange={e=>saveSett({...sett,loopGap:parseInt(e.target.value)})}/></div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{BRTH.map((b,i)=><button key={i} onClick={()=>saveSett({...sett,breathingPattern:i})} style={{padding:"5px 11px",borderRadius:20,fontSize:11,cursor:"pointer",border:"1px solid "+(sett.breathingPattern===i?P.tl:P.gb),background:sett.breathingPattern===i?"rgba(90,190,190,0.1)":"transparent",color:sett.breathingPattern===i?P.tl:P.mt}}>{b.n}</button>)}</div></Cd>
      <Cd><h4 style={{margin:"0 0 10px",fontSize:14,color:P.mt,fontFamily:"'Cormorant Garamond',serif"}}>Account</h4>
        <p style={{fontSize:11,color:P.mt,marginBottom:8}}>{user?.email}</p>
        <Bt v="danger" onClick={async()=>{await sb?.auth.signOut();setVw("auth")}} style={{width:"100%"}}>Sign Out</Bt></Cd></div>}

  // NAV
  const nav=[{id:"library",ic:"📖",l:"Library"},{id:"blueprint",ic:"🏗",l:"Blueprint"},{id:"evidence",ic:"amulet",l:"Evidence"},{id:"log",ic:"📊",l:"Log"},{id:"settings",ic:"⚙",l:"Settings"}];
  const showNav=!playing&&!["editor","affEditor","auth","onboarding"].includes(vw)&&user;
  const rv=()=>{if(aLoading)return<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh"}}><div style={{textAlign:"center"}}><Logo size={50}/><p style={{color:P.mt,marginTop:16,fontFamily:"'Nunito',sans-serif"}}>Opening portal...</p></div></div>;
    switch(vw){case "auth":return<AuthVw/>;case "onboarding":return<OnboardVw/>;case "library":return<LibVw/>;case "editor":return<EdVw/>;case "affEditor":return<AffEdVw/>;case "blueprint":return<BpVw/>;case "evidence":return<EvVw/>;case "log":return<LogVw/>;case "player":return<PlayerVw/>;case "settings":return<SettVw/>;default:return<LibVw/>}};

  return<div style={{height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
    <Stars/><Nebs/>
    <div style={{flex:1,overflow:"auto",paddingBottom:showNav?62:0,position:"relative",zIndex:1}}>{rv()}</div>
    {showNav&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(7,10,24,0.92)",borderTop:"1px solid "+P.gb,display:"flex",justifyContent:"space-around",padding:"6px 0 12px",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",zIndex:10}}>
      {nav.map(n=><button key={n.id} onClick={()=>setVw(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:vw===n.id?P.ac:P.mt,fontSize:9,padding:"3px 10px",transition:"color 0.3s"}}><span style={{fontSize:18}}>{n.ic==="amulet"?<Logo size={14}/>:n.ic}</span>{n.l}</button>)}</div>}</div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
